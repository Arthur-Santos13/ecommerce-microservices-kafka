server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # ─── Default Filters (applied to every route) ──────────────────────────
      # X-Api-Version is also injected by RequestTracingFilter at runtime.
      # This YAML-level default ensures it appears even without the filter active.
      default-filters:
        - name: AddRequestHeader
          args:
            name: X-Api-Version
            value: v1

      # ─── Service Routes ────────────────────────────────────────────────────
      # URIs are static (localhost) for now. Service discovery (Eureka / lb://)
      # will be introduced in the operational phase (9.5).
      routes:

        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: AddRequestHeader
              args:
                name: X-Source-Service
                value: api-gateway
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 500ms
                  maxBackoff: 2000ms
                  factor: 2
            - name: CircuitBreaker
              args:
                name: product-service-cb
                fallbackUri: forward:/fallback/products

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: AddRequestHeader
              args:
                name: X-Source-Service
                value: api-gateway
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 500ms
                  maxBackoff: 2000ms
                  factor: 2
            - name: CircuitBreaker
              args:
                name: order-service-cb
                fallbackUri: forward:/fallback/orders

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: AddRequestHeader
              args:
                name: X-Source-Service
                value: api-gateway
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 500ms
                  maxBackoff: 2000ms
                  factor: 2
            - name: CircuitBreaker
              args:
                name: payment-service-cb
                fallbackUri: forward:/fallback/payments

      httpclient:
        connect-timeout: 2000       # ms — max time to establish a connection to a downstream service
        response-timeout: 10s       # max time to wait for a response from a downstream service

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: [ GET, POST, PUT, DELETE, PATCH, OPTIONS ]
            allowedHeaders: "*"
            maxAge: 3600

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway, circuitbreakers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true   # exposes /actuator/gateway/routes for runtime inspection
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: API Gateway - Routes and applies resilience policies across all services
    version: '@project.version@'

logging:
  level:
    org.springframework.cloud.gateway: INFO

resilience4j:
  timelimiter:
    instances:
      product-service-cb:
        timeout-duration: 3s
      order-service-cb:
        timeout-duration: 3s
      payment-service-cb:
        timeout-duration: 3s
  circuitbreaker:
    instances:
      product-service-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      order-service-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
      payment-service-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
