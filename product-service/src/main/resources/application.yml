server:
  port: 8081

spring:
  application:
    name: product-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:25432}/product_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      keepalive-time: 30000        # send keepalive every 30s to prevent DB closing idle connections
      idle-timeout: 300000         # remove idle connections after 5min (< DB's idle timeout)
      max-lifetime: 900000         # retire connections after 15min
      minimum-idle: 2              # keep at least 2 idle connections ready
      connection-timeout: 30000    # max wait for a connection from pool
      connection-test-query: SELECT 1  # validate connection before use
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Product Service - Manages product catalog and inventory
    version: '@project.version@'

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  topics:
    product-created: product.created
    product-updated: product.updated
    product-deleted: product.deleted

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.ecommerce: INFO
