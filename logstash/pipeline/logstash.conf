input {
  # Receives JSON over TCP from all Spring Boot services (LogstashTcpSocketAppender)
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Normalize the @timestamp field if present
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Copy service name into a top-level field for easier filtering in Kibana
  if [service] {
    mutate { add_field => { "application" => "%{service}" } }
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "ecommerce-logs-%{+YYYY.MM.dd}"
    # Retries on transient failures
    retry_on_conflict => 3
  }
}
